# Multi-model SGLang layout for MOPD (Multi-Objective Policy Distillation)
# with Qwen3-30B-A3B on 5 nodes (40 GPUs).
#
# Layout:
#   Actor (training): 2 nodes x 8 GPUs = 16 GPUs (TP=4, EP=8, DP=2)
#   Rollout:          3 nodes x 8 GPUs = 24 GPUs (below)
#     student: 16 GPUs, TP=2 -> 8 engines (rollout generation, weight updates)
#     tool:     4 GPUs, TP=2 -> 2 engines (teacher log-probs, frozen)
#     code:     2 GPUs, TP=2 -> 1 engine (teacher log-probs, frozen)
#     math:     2 GPUs, TP=2 -> 1 engine (teacher log-probs, frozen)
#
# Teacher names must match sample.metadata["domain"] from pool data.
# Total num_gpus = 16 + 4 + 2 + 2 = 24 = --rollout-num-gpus.

sglang:
  - name: student
    update_weights: true
    server_groups:
      - worker_type: regular
        num_gpus: 16
        num_gpus_per_engine: 2
        overrides:
          mem_fraction_static: 0.82

  - name: tool
    model_path: /inspire/qb-ilm/project/cq-scientific-cooperation-zone/public/avalanche/experiments/qwen3_30b_a3b_mdv1_3node_tool50_struct35_stem15_0330-234805/hf_cache/iter_0000113_hf
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 4
        num_gpus_per_engine: 2
        overrides:
          mem_fraction_static: 0.76
          max_running_requests: 24
          disable_cuda_graph: true

  - name: code
    model_path: /inspire/qb-ilm/project/cq-scientific-cooperation-zone/public/avalanche/jl_workspace/experiment/code/output/qwen3-30b-a3b-code-3node/hf_cache/iter_0000099_hf
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 2
        num_gpus_per_engine: 2
        overrides:
          mem_fraction_static: 0.78
          max_running_requests: 32
          disable_cuda_graph: true

  - name: math
    model_path: /inspire/qb-ilm/project/cq-scientific-cooperation-zone/public/avalanche/jl_workspace/experiment/math/output/qwen3-30b-a3b-deepmath-3node/hf_cache/iter_0000339_hf
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 2
        num_gpus_per_engine: 2
        overrides:
          mem_fraction_static: 0.76
          max_running_requests: 24
          disable_cuda_graph: true
