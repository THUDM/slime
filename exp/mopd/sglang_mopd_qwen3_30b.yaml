# Multi-model SGLang layout for MOPD (Multi-Objective Policy Distillation)
# with Qwen3-30B-A3B on 4 nodes (32 GPUs).
#
# Layout:
#   Actor (training): 2 nodes x 8 GPUs = 16 GPUs (TP=4, EP=8, DP=2)
#   Rollout:          2 nodes x 8 GPUs = 16 GPUs (below)
#     student: 10 GPUs (rollout generation, weight updates)
#     tool:     2 GPUs (teacher log-probs, frozen; handles tool/stem/structured)
#     code:     2 GPUs (teacher log-probs, frozen)
#     math:     2 GPUs (teacher log-probs, frozen)
#
# Teacher names must match sample.metadata["domain"] from pool data.
# Total num_gpus = 10 + 2 + 2 + 2 = 16 = --rollout-num-gpus.
#
# Teachers are latency-insensitive compared with the student rollout path, so
# we bias them for stability: lower static memory reservation, cap concurrent
# requests, and disable CUDA graph capture to keep extra headroom for long
# log-prob scoring requests.

sglang:
  - name: student
    update_weights: true
    server_groups:
      - worker_type: regular
        num_gpus: 10
        num_gpus_per_engine: 1

  - name: tool
    model_path: /inspire/qb-ilm/project/cq-scientific-cooperation-zone/public/avalanche/experiments/qwen3_30b_a3b_mdv1_3node_tool50_struct35_stem15_0330-234805/hf_cache/iter_0000113_hf
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 2
        num_gpus_per_engine: 2
        overrides:
          mem_fraction_static: 0.8
          max_running_requests: 64
          disable_cuda_graph: true

  - name: code
    model_path: /inspire/qb-ilm/project/cq-scientific-cooperation-zone/public/avalanche/jl_workspace/experiment/code/output/qwen3-30b-a3b-code-3node/hf_cache/iter_0000059_hf
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 2
        num_gpus_per_engine: 2
        overrides:
          mem_fraction_static: 0.8
          max_running_requests: 64
          disable_cuda_graph: true

  - name: math
    model_path: /inspire/qb-ilm/project/cq-scientific-cooperation-zone/public/avalanche/jl_workspace/experiment/math/output/qwen3-30b-a3b-deepmath-3node-ablation-data-deepmath-dapo-bigmath/hf_cache/iter_0000219_hf
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 2
        num_gpus_per_engine: 2
        overrides:
          mem_fraction_static: 0.8
          max_running_requests: 64
          disable_cuda_graph: true
